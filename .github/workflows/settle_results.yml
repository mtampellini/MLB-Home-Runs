name: Settle results

on:
  schedule:
    # Four fires per day. settle.py default now settles BOTH today and yesterday
    # (idempotent — finished games stay W/L, in-progress stay VOID until the next
    # fire). This lets the tracker update intra-day as games finish.
    #   22:13 UTC = 6:13pm ET → afternoon games done, evening games starting
    #   02:13 UTC = 10:13pm ET → most evening games done
    #   05:13 UTC =  1:13am ET → west coast games done
    #   09:13 UTC =  5:13am ET → catch-all final settle for the prior day
    # Off-hour minute (:13) on purpose: top-of-hour cron times have heavy
    # GitHub Actions contention and runs are commonly skipped under load.
    - cron: "13 2,5,9,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: settle-results
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Live branch tip, not the trigger-time SHA — queued runs otherwise
          # check out a tree that predates the run ahead of them (see
          # daily_picks.yml, 2026-06-10 failure).
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Settle today + yesterday
        working-directory: backend
        run: python -m src.results.settle

      - name: Update tracker
        working-directory: backend
        run: python -m src.results.tracker

      - name: CLV report (fair-prob closing-line value by cohort)
        working-directory: backend
        # Read-only over local snapshots + archives (no API credits). Rebuilds
        # the full window each run — idempotent and self-healing. The cohort
        # summary with CIs prints into this step's log; the per-pick CSV is
        # committed below (gitignore exception) so review tooling can read it.
        run: python -m src.backtest.clv_recover

      - name: Show tracker summary
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("backend/data/processed/tracker.json")
          if not p.exists():
              print("no tracker.json"); raise SystemExit(0)
          d = json.loads(p.read_text())
          s = d.get("summary", {})
          print(f"total_picks={s.get('total_picks')}  "
                f"wins={s.get('wins')}  losses={s.get('losses')}  voids={s.get('voids')}")
          print(f"hit_rate={s.get('hit_rate')}  ROI%={s.get('roi_pct')}  "
                f"avg_CLV%={s.get('avg_clv_pct')}  n_clv={s.get('n_picks_with_clv')}")
          PY

      - name: Commit results + tracker
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/processed backend/data/daily_archives
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Settle results $(TZ='America/New_York' date +%Y-%m-%d) + tracker [ci skip]"
          # Can collide with daily-picks pushes if GitHub defers this run into the picks window.
          # -X theirs keeps this run's settle/tracker output on conflict
          # (settle is idempotent — the next fire re-settles anything lost);
          # abort a conflicted rebase so retries start clean.
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin main && git push; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying after backoff..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "push failed after 5 attempts"
          exit 1
