name: Settle results

on:
  schedule:
    # 14:00 UTC = 10am ET (EDT) / 9am ET (EST). Yesterday's box scores stable.
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: settle-results
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Settle yesterday
        working-directory: backend
        run: python -m src.results.settle

      - name: Update tracker
        working-directory: backend
        run: python -m src.results.tracker

      - name: Show tracker summary
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("backend/data/processed/tracker.json")
          if not p.exists():
              print("no tracker.json"); raise SystemExit(0)
          d = json.loads(p.read_text())
          s = d.get("summary", {})
          print(f"total_picks={s.get('total_picks')}  "
                f"wins={s.get('wins')}  losses={s.get('losses')}  voids={s.get('voids')}")
          print(f"hit_rate={s.get('hit_rate')}  ROI%={s.get('roi_pct')}  "
                f"avg_CLV%={s.get('avg_clv_pct')}  n_clv={s.get('n_picks_with_clv')}")
          PY

      - name: Commit results + tracker
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/processed
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Settle results $(date -u -d 'yesterday' +%Y-%m-%d) + tracker [ci skip]"
          git push
