name: Settle results

on:
  schedule:
    # 09:13 UTC ≈ 5:13am ET (EDT) / 4:13am ET (EST). West Coast games end ~1am ET,
    # so yesterday's box scores are stable well before this fire.
    # Off-hour minute on purpose: top-of-hour cron times have heavy contention
    # on GitHub Actions and runs are commonly skipped or deferred for hours
    # under load. https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: "13 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: settle-results
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Settle yesterday
        working-directory: backend
        run: python -m src.results.settle

      - name: Update tracker
        working-directory: backend
        run: python -m src.results.tracker

      - name: Show tracker summary
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("backend/data/processed/tracker.json")
          if not p.exists():
              print("no tracker.json"); raise SystemExit(0)
          d = json.loads(p.read_text())
          s = d.get("summary", {})
          print(f"total_picks={s.get('total_picks')}  "
                f"wins={s.get('wins')}  losses={s.get('losses')}  voids={s.get('voids')}")
          print(f"hit_rate={s.get('hit_rate')}  ROI%={s.get('roi_pct')}  "
                f"avg_CLV%={s.get('avg_clv_pct')}  n_clv={s.get('n_picks_with_clv')}")
          PY

      - name: Commit results + tracker
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/processed backend/data/daily_archives
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Settle results $(date -u -d 'yesterday' +%Y-%m-%d) + tracker [ci skip]"
          # Can collide with daily-picks pushes if GitHub defers this run into the picks window.
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying after backoff..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "push failed after 5 attempts"
          exit 1
