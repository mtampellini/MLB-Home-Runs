name: Capture closing odds

# DATA COLLECTION ONLY — no model, no filters, no features. Pulls late odds
# snapshots near first pitch so recovered CLV reflects the TRUE close for the
# back half of the filter experiment (see backend/scripts/capture_closing_odds.py
# and backend/src/backtest/clv_recover.py).
#
# ENABLED 2026-05-28: account reinstated and stable; daily-picks was reduced to
# ~30/day, so the total footprint with this job (~5 fires/day) stays well under
# the ~54/day that likely triggered the earlier suspension.
#
# This workflow does NOT touch filter thresholds, MODEL_VERSION, or features, so
# running it does not violate the pre-registered experiment lock (to 2026-06-18).

on:
  schedule:
    # Late window targeting first pitches at ~T-15 to close. Off-peak minutes
    # to dodge cron contention; multiple fires give defense-in-depth against
    # GitHub's 30-50% scheduled-event skip rate.
    - cron: "50,59 23 * * *"   # 23:50 / 23:59 UTC — just before the evening wave
    - cron: "9,29 0 * * *"     # 00:09 / 00:29 UTC — evening first pitches at close
    - cron: "55 1 * * *"       # 01:55 UTC — late West Coast games at ~T-15
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: capture-closing-odds
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
      ODDS_API_KEY_3: ${{ secrets.ODDS_API_KEY_3 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Live branch tip, not the trigger-time SHA — queued runs otherwise
          # check out a tree that predates the run ahead of them (see
          # daily_picks.yml, 2026-06-10 failure).
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps (odds capture only — no model)
        run: python -m pip install --upgrade pip requests

      - name: Capture closing odds snapshot
        working-directory: backend
        run: python -m scripts.capture_closing_odds

      - name: Commit closing snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/odds
          if git diff --staged --quiet; then
            echo "no new snapshot to commit"
            exit 0
          fi
          git commit -m "Closing odds capture $(date -u +%Y-%m-%dT%H%MZ) [ci skip]"
          # Can race the daily-picks push; rebase-and-retry handles it.
          # -X theirs keeps this run's snapshot on conflict (filenames are
          # timestamped, so real conflicts are near-impossible); abort a
          # conflicted rebase so retries start clean.
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin main && git push; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying after backoff..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "push failed after 5 attempts"
          exit 1
