name: Daily picks

on:
  schedule:
    # 15:00 UTC = 11am ET (EDT) / 10am ET (EST). Per project README the DST
    # hour shift is acceptable; lineups still post in time.
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-picks
  cancel-in-progress: false

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Sanity tests (fast)
        working-directory: backend
        run: pytest tests/ -q

      - name: Run daily pipeline
        working-directory: backend
        run: python -m src.pipeline.run_daily

      - name: Copy tier files to repo root for Vercel + tracker
        run: |
          cp backend/picks.json picks.json
          cp backend/secondary_picks.json secondary_picks.json
          cp backend/shadow_picks.json shadow_picks.json

      - name: Show summary
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("picks.json")
          if not p.exists():
              print("no picks.json"); raise SystemExit(0)
          d = json.loads(p.read_text())
          print(f"as_of_date={d.get('as_of_date')}")
          print(f"picks_count={len(d.get('picks', []))}")
          print(f"skipped_count={d.get('skipped_count')}")
          for pk in d.get("picks", [])[:5]:
              best = pk['best_book']
              odds = pk.get('dk_odds') if best == 'draftkings' else pk.get('fd_odds')
              print(f"  {pk['batter']:25s}  EV={pk['ev_pct']}%  best={best}@{odds}")
          PY

      - name: Commit picks + odds snapshot + dated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add picks.json secondary_picks.json shadow_picks.json
          git add backend/data/odds backend/data/processed backend/data/daily_archives
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Daily picks $(date -u +%Y-%m-%d) [ci skip]"
          git push
