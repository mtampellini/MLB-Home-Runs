name: Daily picks

on:
  schedule:
    # Every 20 minutes from 14:00 to 23:59 UTC = 10:00am to 7:59pm ET (EDT).
    # Fires at :00, :20, :40 each hour → ~30 scheduled runs/day.
    #
    # Reduced 2026-05-26 from */13 (~50/day) to */20 (~30/day) to lower the
    # GitHub Actions footprint after an account suspension that the ~50/day
    # cadence likely triggered (abuse/mining false-positive). This is a cron
    # frequency change only — it does NOT touch filters, MODEL_VERSION, or
    # features, so it does not violate the experiment lock (to 2026-06-18).
    #
    # Why still this many fires:
    #   1. Lineup-posting times span ~9 hours per day — afternoon games' lineups
    #      post 9-10am; 10pm West Coast games' lineups don't post until 6pm ET.
    #   2. GitHub Actions scheduled events are unreliable, especially at popular
    #      cron minutes (:00, :15, :30). Skip rate observed at 30-50% during
    #      evening hours. Off-peak minutes (*/20) give defense in depth —
    #      expected fire rate ≈ every 30-40 min real-world across the window.
    #   3. run_daily is idempotent (merge mode): each fire only processes
    #      game_pks not already in today's archive. Re-runs with no new lineups
    #      exit fast.
    #   4. Concurrency guard below queues overlapping fires instead of letting
    #      them race the git push.
    - cron: "*/20 14-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-picks
  cancel-in-progress: false

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
      ODDS_API_KEY_3: ${{ secrets.ODDS_API_KEY_3 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Sanity tests (fast)
        working-directory: backend
        run: pytest tests/ -q

      - name: Run daily pipeline
        working-directory: backend
        run: python -m src.pipeline.run_daily

      - name: Copy tier files to repo root for Vercel + tracker
        run: |
          cp backend/picks.json picks.json
          cp backend/secondary_picks.json secondary_picks.json
          cp backend/shadow_picks.json shadow_picks.json

      - name: Show summary
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("picks.json")
          if not p.exists():
              print("no picks.json"); raise SystemExit(0)
          d = json.loads(p.read_text())
          print(f"as_of_date={d.get('as_of_date')}")
          print(f"picks_count={len(d.get('picks', []))}")
          print(f"skipped_count={d.get('skipped_count')}")
          for pk in d.get("picks", [])[:5]:
              best = pk['best_book']
              odds = pk.get('dk_odds') if best == 'draftkings' else pk.get('fd_odds')
              print(f"  {pk['batter']:25s}  EV={pk['ev_pct']}%  best={best}@{odds}")
          PY

      - name: Commit picks + odds snapshot + dated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add picks.json secondary_picks.json shadow_picks.json
          git add backend/data/odds backend/data/processed backend/data/daily_archives
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Daily picks $(date -u +%Y-%m-%d) [ci skip]"
          # Hourly fires can overlap; rebase-and-retry handles the push race.
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying after backoff..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "push failed after 5 attempts"
          exit 1
